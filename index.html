<!DOCTYPE html><html>
<head>
    <title>Easy Bank</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f2f2f2;
        }
        h1 {
            text-align: center;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #balance {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body><h1>Easy Bank</h1><div class="card">
    <h3>Account Balance</h3>
    <div id="balance">₦0</div>
</div><div class="card">
    <h3>Deposit Money</h3>
    <input id="email" placeholder="Enter your email">
    <input id="depositAmount" placeholder="Enter amount">
    <button onclick="deposit()">Deposit</button>
</div><div class="card">
    <h3>Transfer Money</h3>
    <input id="receiver" placeholder="Receiver Name">
    <input id="transferAmount" placeholder="Enter amount">
    <button onclick="sendMoney()">Send</button>
</div><div class="card">
    <h3>Buy Airtime/Data</h3>
    <input id="buyAmount" placeholder="Enter amount">
    <button onclick="buy()">Buy</button>
</div><div class="card">
    <h3>Transaction History</h3>
    <div id="history"></div>
</div><script>
let balance = localStorage.getItem("balance") || 0;
balance = parseInt(balance);

function updateBalance() {
    document.getElementById("balance").innerText = "₦" + balance;
    localStorage.setItem("balance", balance);
}

updateBalance();

// ✅ PAYSTACK DEPOSIT WITH EMAIL
function deposit() {
    let email = document.getElementById("email").value;
    let amount = document.getElementById("depositAmount").value;

    if (email === "" || amount === "") {
        alert("Enter email and amount");
        return;
    }

    let handler = PaystackPop.setup({
        key: "pk_test_98b033e4d1b5a6c4916c474c41f6c68e1e6a07b6",
        email: email,
        amount: amount * 100,
        currency: "NGN",

        callback: function(response) {
            balance += parseInt(amount);
            updateBalance();
            saveHistory("Deposited ₦" + amount + " (Paystack)");
            alert("Payment successful!");
        },

        onClose: function() {
            alert("Transaction cancelled");
        }
    });

    handler.openIframe();
}

// Transfer
function sendMoney() {
    let name = document.getElementById("receiver").value;
    let amount = document.getElementById("transferAmount").value;

    if (name === "" || amount === "") {
        alert("Fill all fields");
        return;
    }

    if (parseInt(amount) > balance) {
        alert("Insufficient balance");
        return;
    }

    balance -= parseInt(amount);
    updateBalance();
    saveHistory("Sent ₦" + amount + " to " + name);
}

// Buy Airtime/Data
function buy() {
    let amount = document.getElementById("buyAmount").value;

    if (amount === "") {
        alert("Enter amount");
        return;
    }

    if (parseInt(amount) > balance) {
        alert("Insufficient balance");
        return;
    }

    balance -= parseInt(amount);
    updateBalance();
    saveHistory("Bought Airtime ₦" + amount);
}

// History
function saveHistory(text) {
    let history = localStorage.getItem("history") || "";
    history += "<p>" + text + "</p>";
    localStorage.setItem("history", history);
    document.getElementById("history").innerHTML = history;
}

document.getElementById("history").innerHTML = localStorage.getItem("history") || "";
</script></body>
</html>
